<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="color-scheme" content="light dark">
    <title>A Verdade e a J-u-s-t-i-ça</title>
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/4.0.0/model-viewer.min.js"></script>
    <link rel="stylesheet" href="index.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fira+Sans:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Merriweather:ital,opsz,wght@0,18..144,300..900;1,18..144,300..900&display=swap" rel="stylesheet">
    <meta name="theme-color" media="(prefers-color-scheme: light)" content="#EA562E">
    <meta name="theme-color" media="(prefers-color-scheme: dark)" content="#EA562E">
    <link rel="manifest" href="manifest.json">
</head>
<body>

    <div class="main-wrapper">
        <div class="main-btn-container">
            <button class="btn" id="selectBtn">Select your Experience</button>
            <div class="popup-menu" id="popupMenu">
                <a class="btn-markerless" href="markerbased.html">Marker-based Experience</a>
                <a class="btn-markerless" href="markerless.html">Markerless Experience</a>
            </div>
        </div>
    </div>
    <section class="hero-desktop">

    <div class="hero-left"></div>
    
    <div class="hero-right">
        <h1 class="hero-right-header">
            Access the experiences on your mobile phone
        </h1>

        <img
            src="./public/images/qr-code.png"
            alt="QR Code"
            class="qr-code"
        />

        <p class="hero-right-description">
            If using a tablet, set it to portrait mode.
        </p>
    </div>

</section>
<script>
  const selectBtn = document.getElementById('selectBtn');
  const popupMenu = document.getElementById('popupMenu');

  selectBtn.addEventListener('click', (e) => {
    e.stopPropagation();
    popupMenu.classList.toggle('open');
  });

  document.addEventListener('click', () => {
    popupMenu.classList.remove('open');
  });
</script>
</body>
</html>
